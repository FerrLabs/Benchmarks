name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tags, no release)'
        type: boolean
        default: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ShellCheck
        run: shellcheck scripts/*.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run tests
        run: bats tests/

  release:
    name: Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    outputs:
      tag: ${{ steps.detect-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # FerrFlow runs with bot: true — it pushes via an App installation
          # token from its OIDC exchange, not the checkout-persisted
          # GITHUB_TOKEN. Persisting GITHUB_TOKEN would let it win over the bot
          # token on push (github-actions[bot] can't bypass branch rules).
          persist-credentials: false
      - name: Record previous tag
        id: prev-tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
      - uses: FerrLabs/FerrFlow@755d44bc01c8f47ee8602df7b69c68b72271a71d # v5
        with:
          bot: true
          dry_run: ${{ inputs.dry_run }}
      - name: Detect new tag
        id: detect-tag
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          PREV_TAG="${{ steps.prev-tag.outputs.tag }}"
          if [[ -n "$NEW_TAG" && "$NEW_TAG" != "$PREV_TAG" ]]; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    name: Benchmark
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: FerrLabs/FerrFlow
          path: ferrflow-src
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ferrflow-src
      - name: Install hyperfine and jq
        run: |
          cargo install hyperfine
          sudo apt-get install -y jq
      - name: Build ferrflow
        timeout-minutes: 30
        run: cargo build --release
        working-directory: ferrflow-src
      - name: Add ferrflow to PATH
        run: echo "${{ github.workspace }}/ferrflow-src/target/release" >> "$GITHUB_PATH"
      - name: Generate benchmark fixtures
        uses: FerrLabs/Fixtures@3d9971a22666f2d5d262d5a308920af191e16a4a # v1.1.1
        with:
          definitions: ferrflow-src/benchmarks/fixtures/definitions
          generated-dir: /tmp/bench-fixtures
      - name: Run benchmarks
        timeout-minutes: 60
        run: |
          bash scripts/run.sh \
            --skip-competitors \
            --fixtures-dir /tmp/bench-fixtures \
            --results-dir /tmp/bench-results
      - name: Step summary
        run: bash scripts/format-release.sh /tmp/bench-results/latest.json >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: /tmp/bench-results/latest.json
          retention-days: 90

  update-release:
    name: Update release with benchmarks
    needs: [release, benchmark]
    runs-on: ubuntu-latest
    if: needs.release.outputs.tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: benchmark-results
          path: /tmp/bench-results
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Append benchmark results to release
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          PERF=$(bash scripts/format-release.sh /tmp/bench-results/latest.json)
          CURRENT_BODY=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")
          printf -v NEW_BODY '%s\n\n%s' "$CURRENT_BODY" "$PERF"
          gh release edit "$TAG" --notes "$NEW_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
